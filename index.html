<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/6993eba91209ee0a1089f355/fd9cfe023_6f5fd5cc-8fc9-4041-9d87-c24e77a3bc58.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Primary meta — title/description/og tags are injected per-page by react-helmet-async -->
    <title>Stand Tall Booking — Scheduling Software for Barbershops</title>

    <!-- Open Graph — site-wide constants only; per-page values set by Helmet -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://standtallbooking.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Stand Tall Booking" />

    <!-- Twitter Card — site-wide constants only -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://standtallbooking.com/og-image.png" />

    <!-- Fonts: preconnect then single consolidated load for Bebas Neue + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
